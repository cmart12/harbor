<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Main view -->
    <div id="main-view">
      <header>
        <h1>⚡ Intent</h1>
        <div class="header-actions">
          <span id="intent-count" class="badge">0</span>
          <button id="timeline-btn" class="header-icon-btn" title="Activity log">📋</button>
          <button id="settings-btn" class="header-icon-btn" title="Settings">⚙</button>
        </div>
      </header>

      <div id="focus-banner" class="focus-banner hidden">
        <div class="focus-label">🎯 FOCUSED</div>
        <div class="focus-content">
          <div id="focus-desc" class="focus-desc"></div>
          <div id="focus-meta" class="focus-meta"></div>
        </div>
        <button id="focus-done" class="focus-action" title="Complete">✓</button>
        <button id="focus-clear" class="focus-action" title="Unfocus">✕</button>
      </div>

      <form id="capture-form">
        <div class="input-wrapper">
          <textarea
            id="description-input"
            placeholder="Capture an intent — type or press space to speak..."
            autocomplete="off"
            autofocus
            rows="1"
          ></textarea>
          <div id="recording-indicator" class="recording-indicator hidden">
            <span class="rec-dot"></span>
          </div>
          <button type="submit" id="submit-btn" class="submit-btn" title="Submit (Enter)">↩</button>
        </div>
        <div id="status-bar" class="status-bar hidden"></div>
      </form>

      <div id="filter-bar" class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="scheduled">Scheduled</button>
        <button class="filter-btn" data-filter="unscheduled">Open</button>
        <button class="filter-btn" data-filter="past">Past</button>
      </div>

      <div id="intent-list"></div>
      <div id="query-result" class="query-result hidden"></div>
    </div>

    <!-- Settings view -->
    <div id="settings-view" class="settings-view hidden">
      <header>
        <button id="settings-back" class="header-icon-btn" title="Back">←</button>
        <h1>Settings</h1>
        <div class="header-actions"></div>
      </header>

      <div class="settings-content">
        <div class="settings-group">
          <div class="settings-group-title">Appearance</div>
          <div class="settings-row">
            <label>Theme</label>
            <div class="theme-toggle">
              <button id="theme-light" class="theme-btn active" title="Light">☀️</button>
              <button id="theme-dark" class="theme-btn" title="Dark">🌙</button>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-group-title">AI Model</div>
          <div class="settings-row">
            <select id="model-select">
              <option value="">Loading models...</option>
            </select>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-group-title">Workspace</div>
          <div class="settings-row">
            <div class="workspace-display">
              <span id="workspace-path" class="workspace-path">Not set</span>
              <button id="workspace-btn" class="workspace-btn">Change</button>
            </div>
          </div>
          <div class="settings-hint">The working directory for Copilot CLI sessions.</div>
        </div>
      </div>
    </div>

    <!-- Timeline view -->
    <div id="timeline-view" class="timeline-view hidden">
      <header>
        <button id="timeline-back" class="header-icon-btn" title="Back">←</button>
        <h1>📋 Activity</h1>
        <div class="header-actions"></div>
      </header>
      <div id="timeline-content" class="timeline-content"></div>
    </div>

    <!-- Canvas view -->
    <div id="canvas-view" class="canvas-view hidden">
      <header>
        <button id="canvas-back" class="header-icon-btn" title="Back">←</button>
        <h1 id="canvas-title" class="canvas-title-header"></h1>
        <div class="header-actions">
          <span id="canvas-save-status" class="canvas-save-status"></span>
          <button id="canvas-save" class="canvas-save-btn hidden" title="Save (⌘S)">Save</button>
          <button id="canvas-launch" class="header-icon-btn" title="Start session">▶</button>
        </div>
      </header>
      <textarea id="canvas-editor" class="canvas-editor" placeholder="Start writing..."></textarea>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
