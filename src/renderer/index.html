<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>⚡ Intent</h1>
      <div class="header-actions">
        <span id="intent-count" class="badge">0</span>
        <button id="settings-btn" class="header-icon-btn" title="Settings">⚙</button>
      </div>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-row">
        <label for="model-select">Model</label>
        <select id="model-select">
          <option value="">Loading models...</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Workspace</label>
        <div class="workspace-display">
          <span id="workspace-path" class="workspace-path">Not set</span>
          <button id="workspace-btn" class="workspace-btn">Change</button>
        </div>
      </div>
    </div>

    <form id="capture-form">
      <div class="input-wrapper">
        <input
          type="text"
          id="description-input"
          placeholder="Type or press space to speak..."
          autocomplete="off"
          autofocus
        />
        <div id="recording-indicator" class="recording-indicator hidden">
          <span class="rec-dot"></span>
        </div>
      </div>
      <div id="status-bar" class="status-bar hidden"></div>
    </form>

    <div id="intent-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
