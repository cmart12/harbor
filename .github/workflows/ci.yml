name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: ubuntu / node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # NOTE: Windows is intentionally excluded from CI for now. A handful of tests
  # (integration.test.ts file-lock cleanup, window-manager.test.ts electron mock,
  # sdk-runner-skills.test.ts path-separator assertions) fail on Windows runners
  # for environment reasons unrelated to logic. These should be fixed and the
  # `windows-2022` runner added back to the matrix once they pass cleanly.
