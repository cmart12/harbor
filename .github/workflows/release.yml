name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.7). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          # Verify the .p12 is valid
          openssl pkcs12 -in "$CERTIFICATE_PATH" -nokeys -passin pass:"$MACOS_CERTIFICATE_PWD" -info 2>&1 | head -5

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # set-key-partition-list only works when a private key is present
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" || echo "Warning: set-key-partition-list failed (may indicate missing private key in .p12)"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify the identity was imported
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Build, sign, notarize, and publish
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            build/*.dmg
            build/*.zip
            build/*.blockmap
            build/latest-mac.yml
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  release-win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, sign, and publish
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npm run release:win

      - name: Upload win artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            build/*.exe
            build/*.blockmap
            build/latest.yml
          if-no-files-found: error

  draft-release:
    needs: [release-mac, release-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release on private repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          # Delete existing draft for this tag (re-releases)
          gh release delete "$TAG" --repo getnurture/whim --yes 2>/dev/null || true
          # Create fresh draft with all platform artifacts
          gh release create "$TAG" --draft --title "$TAG" --repo getnurture/whim \
            artifacts/release-mac/build/* \
            artifacts/release-win/build/*
